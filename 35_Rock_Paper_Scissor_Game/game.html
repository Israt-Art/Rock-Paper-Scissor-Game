<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scissors game</title>
    <link rel="stylesheet" href="game.css">
</head>

<body>
    
    <h1>rock paper scissors</h1>

    <div class="choices-container">

        <div class="choices" id="rock">
            <img src="e:\Self_Learning\Javascript\35_Rock_Paper_Scissor_Game\rock.png">
        </div>

        <div class="choices" id="paper">
            <img src="e:\Self_Learning\Javascript\35_Rock_Paper_Scissor_Game\paper.png">
        </div>

        <div class="choices" id="scissors">
            <img src="e:\Self_Learning\Javascript\35_Rock_Paper_Scissor_Game\scissors.png">
        </div>

    </div>


    <div class="score-board">

        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>

        <div class="score">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>

    </div>


    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>

    <script src="game.js"></script>

</body>
</html>
